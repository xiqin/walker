<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walker 管理控制台</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 登录界面：token 模式下显示 -->
  <div id="login" class="login-container">
    <div class="login-box">
      <h2>Walker 管理控制台</h2>
      <p class="login-hint">请输入管理 Token 以登录</p>
      <form id="loginForm">
        <input type="password" id="loginToken" placeholder="输入 Token" autocomplete="off">
        <button type="submit" class="btn btn-primary">登录</button>
      </form>
      <div id="loginError" class="error-msg" style="display:none"></div>
    </div>
  </div>

  <!-- 主界面：登录后显示 -->
  <div id="mainApp" class="main-container" style="display:none">
    <!-- 左侧导航 -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h3>Walker</h3>
        <span id="versionBadge" class="version-badge"></span>
      </div>
      <ul class="nav-list">
        <li><a href="#overview" class="nav-link" data-view="overview">总览</a></li>
        <li><a href="#sessions" class="nav-link" data-view="sessions">Sessions</a></li>
        <li><a href="#routes" class="nav-link" data-view="routes">路由</a></li>
        <li><a href="#agents" class="nav-link" data-view="agents">Agent</a></li>
        <li><a href="#runtime" class="nav-link" data-view="runtime">Runtime</a></li>
        <li><a href="#logs" class="nav-link" data-view="logs">日志</a></li>
        <li><a href="#attachments" class="nav-link" data-view="attachments">附件</a></li>
        <li><a href="#config" class="nav-link" data-view="config">配置</a></li>
        <li><a href="#diagnostics" class="nav-link" data-view="diagnostics">诊断</a></li>
        <li><a href="#maintenance" class="nav-link" data-view="maintenance">维护</a></li>
        <li><a href="#tools" class="nav-link" data-view="tools">工具</a></li>
        <li><a href="#metrics" class="nav-link" data-view="metrics">指标</a></li>
      </ul>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="btn btn-small">退出登录</button>
      </div>
    </nav>

    <!-- 主内容区 -->
    <main id="app" class="content-area">
      <!-- 各页面内容由 app.js 动态渲染 -->
    </main>
  </div>

  <!-- 确认弹窗 -->
  <div id="confirmModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <p id="confirmMsg" class="modal-msg"></p>
      <div class="modal-actions">
        <button id="confirmYes" class="btn btn-danger">确认</button>
        <button id="confirmNo" class="btn btn-default">取消</button>
      </div>
    </div>
  </div>

  <!-- 全局提示 -->
  <div id="toast" class="toast" style="display:none"></div>

  <script src="app.js"></script>
</body>
</html>
